name: Security Audit

on:
  schedule:
    # Mondays 03:00 UTC = 08:30 IST. Aligns with the Dependabot batch.
    - cron: '0 3 * * 1'
  pull_request:
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '.github/workflows/security-audit.yml'
  workflow_dispatch: {}

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend, mobile]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      # `npm audit --audit-level=high` exits non-zero only when high or
      # critical advisories are found. Moderate/low show up in the log but
      # don't fail the job — those are tracked by Dependabot grouping.
      - name: Audit ${{ matrix.workspace }}
        working-directory: ${{ matrix.workspace }}
        run: |
          if [ -f package-lock.json ]; then
            echo "::group::Full audit (advisory)"
            npm audit --audit-level=low || true
            echo "::endgroup::"
            echo "::group::Audit gate (high/critical)"
            npm audit --audit-level=high
            echo "::endgroup::"
          else
            echo "no package-lock.json — skipping"
          fi

      - name: Audit summary
        if: always()
        working-directory: ${{ matrix.workspace }}
        run: |
          if [ -f package-lock.json ]; then
            npm audit --json > audit.json || true
            node -e "
              const a = require('./audit.json');
              const v = (a.metadata && a.metadata.vulnerabilities) || {};
              console.log('### ${{ matrix.workspace }} audit summary');
              console.log('| severity | count |');
              console.log('|---|---|');
              for (const k of ['critical','high','moderate','low','info']) {
                console.log(\`| \${k} | \${v[k] || 0} |\`);
              }
            " >> $GITHUB_STEP_SUMMARY
          fi
