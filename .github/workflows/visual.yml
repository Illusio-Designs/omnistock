name: Visual Regression

# Visual diff is opt-in by label only — running on every PR generates noise
# whenever Tailwind output shifts a sub-pixel. Add the `visual-check` label
# to force a run, or trigger manually via workflow_dispatch.
on:
  pull_request:
    types: [labeled]
  workflow_dispatch: {}

jobs:
  visual:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'visual-check'
    name: visual diff
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5001/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run test:visual

      - name: Upload diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
