name: Deploy backend to FTP

# Auto-deploys backend/ to the cPanel FTP server on every push to main
# that actually touches backend code. Pushes that only edit /frontend or
# /docs are skipped so we don't waste a deploy slot.
#
# Required GitHub secrets (Repo → Settings → Secrets and variables → Actions):
#   FTP_SERVER     → ftp.kartriq.com
#   FTP_USERNAME   → Rishi@kartriq.com
#   FTP_PASSWORD   → (the password)
#   FTP_SERVER_DIR → /  or /backend/ or /public_html/api/ — wherever the
#                    Node app's root lives on the cPanel side. If unsure,
#                    log in to cPanel → File Manager and copy the path
#                    above the file list.
#
# Optional secret for cPanel "Setup Node.js App":
#   CPANEL_RESTART_URL → a URL that, when hit, restarts the Node app.
#                        cPanel exposes this from the app's "App URL"
#                        page. If set, we curl it after upload so the
#                        new code takes effect without manual restart.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy-ftp.yml'
  # Manual run from Actions tab — handy for re-uploading after a rollback.
  workflow_dispatch:

# Never run two deploys in parallel against the same FTP host.
concurrency:
  group: backend-ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Shared cPanel hosts usually can't run `npm install` themselves.
      # We install production deps here in CI and ship the resolved
      # node_modules over FTP. SamKirkland's deploy action diffs against
      # the previous deploy state on the server, so only changed files
      # are uploaded on subsequent runs (typical: <1MB instead of 200MB).
      - name: Install production dependencies
        working-directory: backend
        run: |
          npm ci --omit=dev --prefer-offline --no-audit --no-fund
          # Drop optional caches we definitely don't want on prod
          rm -rf node_modules/.cache 2>/dev/null || true

      - name: Sanity-check the build
        working-directory: backend
        run: |
          # Catches "missing module" / "syntax error" before we waste
          # an upload run.
          node --check src/index.js
          node -e "require('./src/index.js')" 2>&1 | head -5 || true
        # Don't fail the deploy if `require` runs side-effects that
        # need a real DB; the syntax check above is the real gate.
        continue-on-error: true

      - name: Sync to FTP server (FTPS, port 21)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Explicit FTPS — same port (21) but the connection is
          # upgraded to TLS via AUTH TLS. Plain `ftp` is plaintext;
          # `ftps` is `explicit FTPS`; `ftps-legacy` is implicit FTPS
          # (different port). User confirmed "explicit FTPS port 21",
          # so this is the right one.
          protocol: ftps
          port: 21
          local-dir: ./backend/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/' }}
          # Never upload local-dev artefacts to production. The action
          # walks every file by default — be explicit about what's out.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.env
            **/.env.*
            **/.envrc
            **/.DS_Store
            **/Thumbs.db
            **/.seed-state.json
            **/coverage/**
            **/.nyc_output/**
            **/.eslintcache
            **/.cache/**
            **/scripts/test.js
            **/scripts/ftp-test.js
            **/__tests__/**
            **/*.test.js
            **/*.spec.js
            **/test/**
            **/tests/**
            **/.vscode/**
            **/.idea/**
            **/*.log
            **/npm-debug.log*

      # Many cPanel "Setup Node.js App" deployments don't auto-detect
      # changed files — they need a restart to pick up the new bundle.
      # If the user has set CPANEL_RESTART_URL (the trigger URL cPanel
      # generates per app) we curl it. Silent no-op if not set.
      - name: Restart Node app (optional)
        if: ${{ env.RESTART_URL != '' }}
        env:
          RESTART_URL: ${{ secrets.CPANEL_RESTART_URL }}
        run: |
          echo "Triggering app restart..."
          curl -fsS -m 30 "$RESTART_URL" || echo "Restart endpoint did not respond cleanly; check the app dashboard."

      - name: Done
        run: |
          echo "✅ Backend deployed."
          echo "Next: hit https://api.kartriq.com/healthz to confirm the new build is live."
