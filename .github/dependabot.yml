# Dependabot configuration for the monorepo. Three ecosystems share the
# same weekly cadence so the noise is bundled into one review window.
#
# Group strategy:
#   - Patches/minors are grouped per package manager so one PR covers the
#     low-risk bumps; majors land as individual PRs that need human review.
#   - Production deps are reviewed first; dev deps batched into the same PR
#     unless they're a major bump.

version: 2
updates:
  # Backend (Express + Knex + integration SDKs)
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Kolkata'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'backend']
    commit-message:
      prefix: 'chore(backend)'
      include: 'scope'
    groups:
      backend-minor-patch:
        applies-to: 'version-updates'
        update-types: ['minor', 'patch']
    ignore:
      # Pinned by infrastructure constraints — bump only after testing
      # against MySQL 8 / Node 20 in staging.
      - dependency-name: 'mysql2'
        update-types: ['version-update:semver-major']
      - dependency-name: 'knex'
        update-types: ['version-update:semver-major']

  # Frontend (Next.js + React + design system)
  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Kolkata'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'frontend']
    commit-message:
      prefix: 'chore(frontend)'
      include: 'scope'
    groups:
      frontend-minor-patch:
        applies-to: 'version-updates'
        update-types: ['minor', 'patch']
    ignore:
      # Major bumps for these touch every page — open as individual PRs.
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']

  # Mobile (Expo + React Native)
  - package-ecosystem: 'npm'
    directory: '/mobile'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Kolkata'
    open-pull-requests-limit: 3
    labels: ['dependencies', 'mobile']
    commit-message:
      prefix: 'chore(mobile)'
      include: 'scope'
    groups:
      mobile-minor-patch:
        applies-to: 'version-updates'
        update-types: ['minor', 'patch']
    ignore:
      # Expo + RN majors require SDK upgrade plans; never bump silently.
      - dependency-name: 'expo'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major']

  # GitHub Actions themselves
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Kolkata'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'ci']
    commit-message:
      prefix: 'chore(ci)'
    groups:
      actions-minor-patch:
        applies-to: 'version-updates'
        update-types: ['minor', 'patch']
